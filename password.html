<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 변경 - 재고관리</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">🔑 비밀번호 변경</div>

      <!-- STEP 1: 로그인 확인 (비로그인 상태) -->
      <div id="section-verify" class="hidden">
        <div class="login-sub">비밀번호를 변경하려면 먼저 로그인해주세요</div>
        <div class="login-field">
          <label>이메일</label>
          <input class="input" type="email" id="input-verify-email" placeholder="이메일 입력" />
        </div>
        <div class="login-field">
          <label>현재 비밀번호</label>
          <input class="input" type="password" id="input-verify-pw" placeholder="현재 비밀번호 입력" />
        </div>
        <button class="btn btn-primary btn-full" id="btn-verify">확인</button>
        <div class="login-msg login-error" id="verify-error"></div>
        <div style="text-align:center;margin-top:16px">
          <a href="login.html" class="login-link">← 로그인으로 돌아가기</a>
        </div>
      </div>

      <!-- STEP 2: 새 비밀번호 설정 (로그인 상태) -->
      <div id="section-change" class="hidden">
        <div class="login-sub" id="change-email-display"></div>
        <div class="login-field">
          <label>새 비밀번호</label>
          <input class="input" type="password" id="input-newpw" placeholder="새 비밀번호 입력 (6자 이상)" />
          <span class="login-hint">영문, 숫자 포함 6자 이상 권장</span>
        </div>
        <div class="login-field">
          <label>새 비밀번호 확인</label>
          <input class="input" type="password" id="input-newpw-confirm" placeholder="새 비밀번호 다시 입력" />
        </div>
        <button class="btn btn-primary btn-full" id="btn-change">비밀번호 변경 완료</button>
        <div class="login-msg login-error" id="change-error"></div>
        <div class="login-msg login-success hidden" id="change-success">✅ 변경 완료! 로그인 화면으로 이동합니다...</div>
        <div style="text-align:center;margin-top:16px">
          <a href="index.html" class="login-link">← 메인으로 돌아가기</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://jghoyzmizwbsomkpxebm.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnaG95em1pendic29ta3B4ZWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5ODM1OTAsImV4cCI6MjA5NDU1OTU5MH0.JbNHPB3O0sxfKpsTF1oj7QDQ5JmTq3kU21Ycormk15w'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const hide = el => el.classList.add('hidden')
    const show = el => el.classList.remove('hidden')

    async function init() {
      const { data: { session } } = await db.auth.getSession()

      if (session) {
        // 이미 로그인된 상태 → 바로 새 비밀번호 설정 화면
        document.getElementById('change-email-display').textContent =
          `${session.user.email} 계정의 비밀번호를 변경합니다`
        show(document.getElementById('section-change'))
      } else {
        // 비로그인 → 먼저 로그인 확인
        show(document.getElementById('section-verify'))
      }
    }

    init()

    // STEP 1: 로그인 확인
    document.getElementById('btn-verify').addEventListener('click', async () => {
      const email = document.getElementById('input-verify-email').value.trim()
      const password = document.getElementById('input-verify-pw').value
      const errEl = document.getElementById('verify-error')
      errEl.textContent = ''

      if (!email || !password) {
        errEl.textContent = '이메일과 현재 비밀번호를 입력해주세요'
        return
      }

      const btn = document.getElementById('btn-verify')
      btn.textContent = '확인 중...'
      btn.disabled = true

      const { data, error } = await db.auth.signInWithPassword({ email, password })

      if (error) {
        errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다'
        btn.textContent = '확인'
        btn.disabled = false
        return
      }

      // 로그인 성공 → 새 비밀번호 설정 화면으로
      hide(document.getElementById('section-verify'))
      document.getElementById('change-email-display').textContent =
        `${data.user.email} 계정의 비밀번호를 변경합니다`
      show(document.getElementById('section-change'))
    })

    document.getElementById('input-verify-pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-verify').click()
    })

    // STEP 2: 새 비밀번호 변경
    document.getElementById('btn-change').addEventListener('click', async () => {
      const pw = document.getElementById('input-newpw').value
      const pwConfirm = document.getElementById('input-newpw-confirm').value
      const errEl = document.getElementById('change-error')
      errEl.textContent = ''

      if (!pw || !pwConfirm) {
        errEl.textContent = '새 비밀번호를 입력해주세요'
        return
      }
      if (pw.length < 6) {
        errEl.textContent = '비밀번호는 6자 이상이어야 합니다'
        return
      }
      if (pw !== pwConfirm) {
        errEl.textContent = '비밀번호가 일치하지 않습니다'
        return
      }

      const btn = document.getElementById('btn-change')
      btn.textContent = '변경 중...'
      btn.disabled = true

      const { error } = await db.auth.updateUser({ password: pw })

      if (error) {
        errEl.textContent = '변경 실패: ' + error.message
        btn.textContent = '비밀번호 변경 완료'
        btn.disabled = false
        return
      }

      // 성공 → 로그아웃 후 로그인 화면으로
      show(document.getElementById('change-success'))
      await db.auth.signOut()
      setTimeout(() => { window.location.href = 'login.html' }, 2000)
    })

    document.getElementById('input-newpw-confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-change').click()
    })
  </script>
</body>
</html>
