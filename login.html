<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 재고관리</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 400px;
      max-width: 90vw;
    }
    .login-logo {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .login-sub {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 32px;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .login-field label {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .login-field .input {
      width: 100%;
      min-width: unset;
    }
    .btn-login {
      width: 100%;
      padding: 11px;
      font-size: 0.95rem;
      margin-top: 8px;
    }
    .login-error {
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 12px;
      min-height: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">📦 재고관리</div>
      <div class="login-sub">계속하려면 로그인하세요</div>

      <div class="login-field">
        <label>이메일</label>
        <input class="input" type="email" id="input-email" placeholder="이메일 입력" />
      </div>
      <div class="login-field">
        <label>비밀번호</label>
        <input class="input" type="password" id="input-password" placeholder="비밀번호 입력" />
      </div>

      <button class="btn btn-primary btn-login" id="btn-login">로그인</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://여기에_프로젝트_URL.supabase.co'
    const SUPABASE_ANON_KEY = '여기에_anon_public_키_붙여넣기'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // 이미 로그인된 경우 메인으로 이동
    db.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html'
    })

    document.getElementById('btn-login').addEventListener('click', async () => {
      const email = document.getElementById('input-email').value.trim()
      const password = document.getElementById('input-password').value
      const errEl = document.getElementById('login-error')
      errEl.textContent = ''

      if (!email || !password) {
        errEl.textContent = '이메일과 비밀번호를 입력해주세요'
        return
      }

      const btn = document.getElementById('btn-login')
      btn.textContent = '로그인 중...'
      btn.disabled = true

      const { error } = await db.auth.signInWithPassword({ email, password })

      if (error) {
        errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다'
        btn.textContent = '로그인'
        btn.disabled = false
        return
      }

      window.location.href = 'index.html'
    })

    // 엔터키 로그인
    document.getElementById('input-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click()
    })
  </script>
</body>
</html>
