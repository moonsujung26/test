<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 재고관리</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">📦 재고관리</div>
      <div class="login-sub">계속하려면 로그인하세요</div>

      <div class="login-field">
        <label>이메일</label>
        <input class="input" type="email" id="input-email" placeholder="이메일 입력" />
      </div>
      <div class="login-field">
        <label>비밀번호</label>
        <input class="input" type="password" id="input-password" placeholder="비밀번호 입력" />
      </div>

      <button class="btn btn-primary btn-full" id="btn-login">로그인</button>
      <div class="login-msg login-error" id="login-error"></div>

      <!-- 비밀번호 변경 링크 -->
      <div style="text-align:center; margin-top:20px;">
        <a href="password.html" class="login-link">🔑 비밀번호 변경</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://jghoyzmizwbsomkpxebm.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnaG95em1pendic29ta3B4ZWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5ODM1OTAsImV4cCI6MjA5NDU1OTU5MH0.JbNHPB3O0sxfKpsTF1oj7QDQ5JmTq3kU21Ycormk15w'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // 이미 로그인된 경우 메인으로
    db.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html'
    })

    document.getElementById('btn-login').addEventListener('click', async () => {
      const email = document.getElementById('input-email').value.trim()
      const password = document.getElementById('input-password').value
      const errEl = document.getElementById('login-error')
      errEl.textContent = ''

      if (!email || !password) {
        errEl.textContent = '이메일과 비밀번호를 입력해주세요'
        return
      }

      const btn = document.getElementById('btn-login')
      btn.textContent = '로그인 중...'
      btn.disabled = true

      const { error } = await db.auth.signInWithPassword({ email, password })

      if (error) {
        errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다'
        btn.textContent = '로그인'
        btn.disabled = false
        return
      }

      window.location.href = 'index.html'
    })

    document.getElementById('input-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click()
    })
  </script>
</body>
</html>
